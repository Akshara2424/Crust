version: "3.9"

# ── CRUST full-stack prototype ─────────────────────────────────────────────────
#
# Usage:
#   1. Copy .env.example → .env and fill in RSA key pair
#   2. docker compose up --build
#
# Services:
#   crust-service  → Python FastAPI ML inference   http://localhost:8000
#   demo-app       → Express + React frontend       http://localhost:3000
#   prometheus     → Metrics scraping               http://localhost:9090
#   grafana        → Dashboards (admin/admin)        http://localhost:3001
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── ML Verification Service (Python / FastAPI) ───────────────────────────────
  crust-service:
    build:
      context:    ./crust-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      CRUST_PRIVATE_KEY_PEM:  ${CRUST_PRIVATE_KEY_PEM}
      CRUST_PUBLIC_KEY_PEM:   ${CRUST_PUBLIC_KEY_PEM}
      CRUST_MODEL_PATH:       /app/model/crust_model.json
      LOG_LEVEL:              info
    volumes:
      - ./crust-service/model:/app/model:ro
    healthcheck:
      test:     ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout:  5s
      retries:  3
    restart: unless-stopped

  # ── Demo Application (Express + React) ───────────────────────────────────────
  demo-app:
    build:
      context:    ./demo-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      CRUST_PUBLIC_KEY_PEM:  ${CRUST_PUBLIC_KEY_PEM}
      CRUST_SERVICE_URL:     http://crust-service:8000
      NODE_ENV:              production
      PORT:                  3000
    depends_on:
      crust-service:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD:    admin
      GF_SECURITY_ADMIN_USER:        admin
      GF_USERS_ALLOW_SIGN_UP:        "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/crust.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
