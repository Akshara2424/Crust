global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: crust-prototype

rule_files: []

scrape_configs:

  # ── CRUST Python verification service ────────────────────────────────────────
  - job_name: crust-service
    metrics_path: /metrics
    static_configs:
      - targets: ["crust-service:8000"]
        labels:
          service: crust-service

  # ── Express demo app (custom /crust/metrics endpoint) ────────────────────────
  - job_name: demo-app
    metrics_path: /crust/metrics
    static_configs:
      - targets: ["demo-app:3000"]
        labels:
          service: demo-app
